<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <circle cx="24" cy="24" r="23" fill="#A0A0A0"/>
  <!-- Porta-potty: blue box with peaked roof, door, vent slits -->
  <g>
    <!-- Roof + body -->
    <rect x="14" y="13" width="20" height="3" fill="#2864B4"/>
    <rect x="13" y="14" width="22" height="24" fill="#2864B4"/>
    <!-- Door panel (lighter blue) -->
    <rect x="16" y="17" width="16" height="20" fill="#5096D2"/>
    <!-- Door frame line -->
    <rect x="16" y="17" width="16" height="20" stroke="#1E4080" stroke-width="1" fill="none"/>
    <!-- Vent slits at top -->
    <line x1="19" y1="20" x2="29" y2="20" stroke="#1E4080" stroke-width="1.5"/>
    <line x1="19" y1="22" x2="29" y2="22" stroke="#1E4080" stroke-width="1.5"/>
    <line x1="19" y1="24" x2="29" y2="24" stroke="#1E4080" stroke-width="1.5"/>
    <!-- Door handle -->
    <circle cx="19" cy="30" r="1.2" fill="#1E4080"/>
  </g>
</svg>
