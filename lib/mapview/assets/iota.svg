    <ellipse cx="14" cy="14" rx="6" ry="2.5" transform="rotate(-25 14 14)"/>
    <ellipse cx="34" cy="14" rx="6" ry="2.5" transform="rotate(25 34 14)"/>
    <ellipse cx="12" cy="20" rx="6" ry="2.5" transform="rotate(15 12 20)"/>
    <ellipse cx="36" cy="20" rx="6" ry="2.5" transform="rotate(-15 36 20)"/>
    <ellipse cx="24" cy="11" rx="3" ry="3"/>
  </g>
</svg>
