name: release

# Builds, signs, and notarizes the macOS release on every pushed tag
# matching v*.*.*. Produces a Developer-ID-signed + Apple-notarized +
# stapled .app and .dmg, uploads both to a draft GitHub Release.
#
# To cut a release: tag the commit (e.g. `git tag v1.0.1 && git push
# --tags`). Review the draft Release in the GitHub UI and click
# Publish.
#
# Required repository secrets:
#   MACOS_CERTIFICATE       base64-encoded Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD   export password for the .p12
#   MACOS_CERTIFICATE_NAME  e.g. "Developer ID Application: Your Name (TEAMID)"
#   NOTARY_APPLE_ID         Apple ID email for notarization
#   NOTARY_TEAM_ID          10-char Apple developer team identifier
#   NOTARY_PASSWORD         app-specific password for the Apple ID

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # Apple Silicon; native arm64 + cross-build to amd64.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Derive release version from tag
        id: ver
        # Strip the leading `v` so v1.0.1 → 1.0.1. Used as
        # NOCORDHF_VERSION downstream and stamped into the .app/.dmg.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID signing certificate
        # Bootstraps a throwaway keychain for this run only, imports
        # the Developer ID Application .p12 from secrets, and makes
        # codesign able to find the identity. The keychain is
        # discarded with the runner at job end.
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend the throwaway keychain to the search list so
          # codesign sees it without disturbing the runner's defaults.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/certificate.p12"
          security find-identity -p codesigning -v

      - name: Store notarytool credentials
        # `make release-mac` uses the keychain-profile form of
        # notarytool; storing under the same profile name the Makefile
        # references means no env-var plumbing into the target.
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials nocordhf-notary \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Build, sign, notarize, and staple
        env:
          NOCORDHF_VERSION: ${{ steps.ver.outputs.version }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: make release-mac

      - name: Zip the .app for release upload
        # The .dmg is the canonical user-facing artefact; the zipped
        # .app is included for users (and CI consumers) who prefer
        # the bundle directly.
        run: |
          cd ./build
          ditto -c -k --keepParent NocordHF.app \
            "NocordHF-${{ steps.ver.outputs.version }}.app.zip"

      - name: Upload artefacts to draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            build/NocordHF-${{ steps.ver.outputs.version }}.dmg
            build/NocordHF-${{ steps.ver.outputs.version }}.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
