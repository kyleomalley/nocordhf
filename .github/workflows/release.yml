name: release

# Builds the cross-platform NocordHF release on every pushed tag
# matching v*.*.*. Produces (in parallel jobs):
#   - macOS:   Developer-ID-signed + Apple-notarized + stapled .app and .dmg
#   - Windows: native .exe (icon-embedded via fyne package), zipped
#   - Linux:   bare .tar.xz (any distro) + .deb (Debian/Ubuntu)
#
# All artefacts upload to the same draft GitHub Release. Publish from
# the GitHub UI when satisfied.
#
# To cut a release: tag the commit (e.g. `git tag v1.0.1 && git push
# --tags`).
#
# Required repository secrets (macOS only — other platforms have no
# code-signing yet, the Linux + Windows binaries ship unsigned):
#   MACOS_CERTIFICATE       base64-encoded Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD   export password for the .p12
#   MACOS_CERTIFICATE_NAME  e.g. "Developer ID Application: Your Name (TEAMID)"
#   MACOS_NOTARIZATION_APPLE_ID         Apple ID email for notarization
#   MACOS_NOTARIZATION_TEAM_ID          10-char Apple developer team identifier
#   MACOS_NOTARIZATION_PWD         app-specific password for the Apple ID

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-14  # Apple Silicon; native arm64 + cross-build to amd64.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Derive release version from tag
        id: ver
        # Strip the leading `v` so v1.0.1 → 1.0.1. Used as
        # NOCORDHF_VERSION downstream and stamped into the .app/.dmg.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID signing certificate
        # Bootstraps a throwaway keychain for this run only, imports
        # the Developer ID Application .p12 from secrets, and makes
        # codesign able to find the identity. The keychain is
        # discarded with the runner at job end.
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend the throwaway keychain to the search list so
          # codesign sees it without disturbing the runner's defaults.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/certificate.p12"
          security find-identity -p codesigning -v

      - name: Store notarytool credentials
        # `make release-mac` uses the keychain-profile form of
        # notarytool; storing under the same profile name the Makefile
        # references means no env-var plumbing into the target.
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PWD: ${{ secrets.MACOS_NOTARIZATION_PWD }}
        run: |
          xcrun notarytool store-credentials nocordhf-notary \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --password "$MACOS_NOTARIZATION_PWD"

      - name: Build, sign, notarize, and staple
        env:
          NOCORDHF_VERSION: ${{ steps.ver.outputs.version }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: make release-mac

      - name: Zip the .app for release upload
        # The .dmg is the canonical user-facing artefact; the zipped
        # .app is included for users (and CI consumers) who prefer
        # the bundle directly.
        run: |
          cd ./build
          ditto -c -k --keepParent NocordHF.app \
            "NocordHF-${{ steps.ver.outputs.version }}.app.zip"

      - name: Upload artefacts to draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            build/NocordHF-${{ steps.ver.outputs.version }}.dmg
            build/NocordHF-${{ steps.ver.outputs.version }}.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Derive release version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install fyne CLI
        # `go install` puts binaries in $(go env GOPATH)/bin which the
        # subsequent shell step needs on PATH. windows-latest already
        # has gcc via the chocolatey-shipped MinGW so CGo just works.
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build + package .exe
        # fyne package emits NocordHF.exe with the icon embedded into
        # the PE resource section so Explorer shows it correctly.
        env:
          NOCORDHF_VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          cd build
          export PATH="$(go env GOPATH)/bin:$PATH"
          GOFLAGS="-ldflags=-X=main.BuildID=v${NOCORDHF_VERSION}" \
            fyne package --target windows --src ../cmd/nocordhf \
              --icon "${GITHUB_WORKSPACE}/docs/icon.png" \
              --app-id com.nocordhf.app --name NocordHF \
              --app-version "${NOCORDHF_VERSION}" --release

      - name: Zip the .exe for release upload
        env:
          NOCORDHF_VERSION: ${{ steps.ver.outputs.version }}
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/NocordHF.exe `
            -DestinationPath "build/NocordHF-${env:NOCORDHF_VERSION}-windows-amd64.zip"

      - name: Upload artefacts to draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            build/NocordHF-${{ steps.ver.outputs.version }}-windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Install build dependencies
        # Cgo deps for the Fyne GL backend (libgl1-mesa-dev), the X11
        # input headers (xorg-dev pulls libx11/xcursor/xrandr/xinerama/xi
        # all at once), and ALSA for malgo's audio capture path.
        # tinygo.org/x/bluetooth's Linux backend talks to BlueZ over
        # DBus at runtime — no compile-time bluez-dev needed.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc libgl1-mesa-dev xorg-dev libasound2-dev

      - name: Derive release version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install fyne + nfpm
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build .tar.xz + .deb
        env:
          NOCORDHF_VERSION: ${{ steps.ver.outputs.version }}
          NOCORDHF_ARCH: amd64
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make release-linux

      - name: Upload artefacts to draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            build/NocordHF-${{ steps.ver.outputs.version }}-linux-amd64.tar.xz
            build/nocordhf_${{ steps.ver.outputs.version }}_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
